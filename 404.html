<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/></head>
<body>
<script>
  // GitHub Pages SPA routing trick:
  // Unknown paths (e.g. /interpret/kr) return this 404 page.
  // We redirect to /?r=<path> so index.html can parse it,
  // then restore the clean URL via history.replaceState.
  var seg = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  if (seg) {
    window.location.replace(
      window.location.origin + '/?r=' + encodeURIComponent(seg) + window.location.hash
    );
  } else {
    window.location.replace(window.location.origin + '/');
  }
</script>
</body>
</html>
